site_name: Britdan Archives
site_url: https://greatbritdan.github.io/archives
nav:
- Home: index.md
- Mappacks:
  - Up And Away 1: mappacks/upandaway.md
  - Up And Away 2: mappacks/upandaway2.md
  - Up And Away 3: mappacks/upandaway3.md

theme:
  name: material
  logo: assets/icon.png
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7 
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - toc.integrate

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@britdan
      name: Britdan on YouTube
    - icon: fontawesome/brands/bluesky
      link: https://bsky.app/profile/britdan.bsky.social
      name: Britdan on Blusky

copyright: Copyright &copy; 2026 Britdan

plugins:
  - search
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
